# Full local stack: mongo + redis + api + web. `docker compose up --build`
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes: ["mongo-data:/data/db"]
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    restart: unless-stopped
    env_file: [.env]
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/lumina
      REDIS_URL: redis://redis:6379
      API_PORT: "4000"
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_started }
    ports: ["4000:4000"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:4000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on: [api]
    ports: ["3000:3000"]

volumes:
  mongo-data:
