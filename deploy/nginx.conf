# Reverse proxy: web on / , API on /api/ . Terminate TLS here (see DEPLOYMENT.md for certbot).
# Copy to /etc/nginx/sites-available/alinaglumina and symlink into sites-enabled.

upstream lumina_web { server 127.0.0.1:3000; }
upstream lumina_api { server 127.0.0.1:4000; }

# HTTP → HTTPS redirect
server {
  listen 80;
  server_name alinaglumina.com www.alinaglumina.com;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  server_name alinaglumina.com www.alinaglumina.com;

  # certbot fills these in:
  ssl_certificate     /etc/letsencrypt/live/alinaglumina.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/alinaglumina.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Security headers
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
  client_max_body_size 10m;

  # API (strip the /api prefix)
  location /api/ {
    proxy_pass http://lumina_api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next.js web app
  location / {
    proxy_pass http://lumina_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
